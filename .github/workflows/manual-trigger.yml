name: Manual Trigger Workflow

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version-file: go.mod

      - name: Build all targets
        run: bash scripts/build.sh --all

      - name: Save macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/kd_macos_*
          if-no-files-found: error
          retention-days: 7
          overwrite: true

      - name: Save Linux and Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-and-win
          path: |
            build/kd_linux_*
            build/kd_windows_*
          if-no-files-found: error
          retention-days: 7
          overwrite: true
